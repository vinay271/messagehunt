<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://*.supabase.co https://*.gstatic.com https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: https://*.supabase.co https://*.gstatic.com https://i.pravatar.cc https://*.googleusercontent.com https://*.openstreetmap.org; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://*.supabase.co; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
    <meta name="description"
        content="Login to Message Hunt - Start your adventure and discover hidden rewards in your city.">
    <title>Login - Message Hunt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
        body {
            background-color: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at 10% 20%, rgba(255, 87, 34, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 87, 34, 0.05) 0%, transparent 40%),
                var(--bg-deep);
        }

        .login-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Using start_bg.png as a subtle overlay or focused element */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('start_bg.png') no-repeat center center;
            background-size: cover;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        .login-content {
            position: relative;
            z-index: 1;
        }

        .brand-logo {
            font-size: 2rem;
            letter-spacing: 4px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .google-btn {
            background-color: #ffffff;
            color: #1f2937;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            justify-content: center;
            margin-top: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .google-btn:hover {
            background-color: #f3f4f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-content">
                <div class="brand-logo glow-text">MESSAGE HUNT</div>
                <p class="subtitle">Your adventure begins with a single step</p>

                <button id="googleSignInBtn" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
                        class="google-icon">
                    Sign in with Google
                </button>

                <p class="mt-4 small text-muted">By signing in, you agree to our Terms of Service</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import config from './config.js';

        const supabaseClient = supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

        async function signInWithGoogle() {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/dashboard.html'
                }
            });

            if (error) {
                console.error('Error logging in:', error.message);
                alert('Authentication failed: ' + error.message);
            }
        }

        document.getElementById('googleSignInBtn').addEventListener('click', signInWithGoogle);

        // Check for existing session
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>

</html>
