<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://*.supabase.co https://*.gstatic.com https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: https://*.supabase.co https://*.gstatic.com https://i.pravatar.cc https://*.googleusercontent.com https://*.openstreetmap.org; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://*.supabase.co; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
    <title>Dashboard - Message Hunt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="styles.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.344.0"></script>
    <style>
        /* Session Guard */
        body {
            display: none;
        }

        :root {
            --header-height: 80px;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow: hidden;
        }

        header {
            background: rgba(13, 13, 14, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            border-bottom: 1px solid var(--glass-border);
            z-index: 1001;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-photo-container {
            position: relative;
            width: 48px;
            height: 48px;
        }

        .user-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .user-name {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .reward-badges {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .reward-points {
            background: rgba(255, 87, 34, 0.1);
            color: var(--primary-bright);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            border: 1px solid rgba(255, 87, 34, 0.2);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            background: #0D0D0E;
            z-index: 1;
        }

        /* Custom Map Styles to match dark theme */
        .leaflet-container {
            background: #0D0D0E !important;
        }

        .leaflet-tile {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        .share-btn-wrapper {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .btn-share {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 700;
            box-shadow: 0 15px 35px var(--primary-glow);
            transition: var(--transition);
        }

        .btn-share:hover {
            transform: scale(1.05) translateY(-5px);
            background: var(--primary-bright);
            box-shadow: 0 20px 45px var(--primary-glow);
        }

        /* Modal Styling */
        .modal-content {
            background: var(--bg-surface);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 20px;
        }

        .modal-header {
            border: none;
            padding-bottom: 0;
        }

        .modal-title {
            font-weight: 800;
            letter-spacing: 1px;
        }

        .modal-footer {
            border: none;
            gap: 10px;
            justify-content: center;
            padding-top: 20px;
        }

        .form-label {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control,
        .form-select {
            background: #0a0a0b;
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 12px;
            padding: 12px 16px;
        }

        .form-control:focus,
        .form-select:focus {
            background: #0a0a0b;
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem var(--primary-glow);
            color: white;
        }

        .btn-send {
            background: var(--primary);
            border: none;
            border-radius: 14px;
            padding: 12px 30px;
            font-weight: 700;
            color: white;
            transition: var(--transition);
            width: 100%;
        }

        .btn-send:hover {
            background: var(--primary-bright);
            transform: translateY(-2px);
        }

        .form-select[multiple] {
            height: auto;
            min-height: 120px;
        }

        /* Map Popup Customization */
        .custom-popup .leaflet-popup-content-wrapper {
            background: rgba(13, 13, 14, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: var(--text-main);
            padding: 10px;
        }

        .custom-popup .leaflet-popup-tip {
            background: rgba(13, 13, 14, 0.9);
            border: 1px solid var(--glass-border);
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import config from './config.js';
        const supabaseClient = supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

        // Make supabaseClient available globally for older code if needed, 
        // but prefer local module scope.
        window.supabaseClient = supabaseClient;

        lucide.createIcons();

        // User profile synchronization
        async function checkSession() {
            const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
            if (sessionError || !session) {
                window.location.href = 'login.html';
                return;
            }

            // Show body only after session is confirmed
            document.body.style.display = 'flex';

            const user = session.user;
            await syncUserProfile(user);
        }

        async function syncUserProfile(authUser) {
            const { data: existingUser, error: fetchError } = await supabaseClient
                .from('users')
                .select('name, photo_url, reward_points')
                .eq('uuid', authUser.id)
                .single();

            if (fetchError && fetchError.code !== 'PGRST116') {
                console.error('Error fetching user:', fetchError.message);
                // Fallback to Google metadata if DB fails
                updateUI(authUser.user_metadata.full_name, authUser.user_metadata.avatar_url, 0);
                return;
            }

            if (existingUser) {
                // User exists, use data from table
                updateUI(existingUser.name, existingUser.photo_url, existingUser.reward_points);
            } else {
                // User doesn't exist, create new record
                const newUser = {
                    uuid: authUser.id,
                    name: authUser.user_metadata.full_name,
                    email: authUser.email,
                    photo_url: authUser.user_metadata.avatar_url,
                    reward_points: 1000 // Give new users 1000 welcome points
                };

                const { error: insertError } = await supabaseClient
                    .from('users')
                    .insert([newUser]);

                if (insertError) {
                    console.error('Error creating user:', insertError.message);
                }

                updateUI(newUser.name, newUser.photo_url, newUser.reward_points);
            }
        }

        function updateUI(name, photoUrl, points) {
            const nameEl = document.querySelector('.user-name');
            const photoEl = document.querySelector('.user-photo');
            const pointsEl = document.querySelector('.reward-points');

            if (name) nameEl.textContent = name;
            if (photoUrl) photoEl.src = photoUrl;
            if (points !== undefined) {
                pointsEl.innerHTML = `<i data-lucide="award" style="width: 14px;"></i> ${points.toLocaleString()} PTS`;
                lucide.createIcons();
            }
        }

        async function handleLogout() {
            const { error } = await supabaseClient.auth.signOut();
            if (error) console.error('Error logging out:', error.message);
            window.location.href = 'index.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', handleLogout);

        checkSession();

        // Initialize Dark-themed Map
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([20.5937, 78.9629], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        L.control.zoom({
            position: 'bottomright'
        }).addTo(map);

        // Global cache for user profiles
        window.userProfileCache = {};

        // --- Utilities ---
        function parseHexEWKB(hex) {
            if (!hex || hex.length < 50) return null;

            // PostGIS EWKB for Point (SRID 4326)
            // 01 01000020 E6100000 <8-byte X> <8-byte Y>
            // 01 = Little Endian
            // Header is 18 hex chars (9 bytes)

            try {
                const hexToFloat64 = (hexPart) => {
                    const bytes = new Uint8Array(hexPart.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                    return new Float64Array(bytes.buffer)[0];
                };

                // The user's hex has an 18-char header: 01 01000020 E6100000
                // Lng starts at index 18 (16 chars)
                // Lat starts at index 34 (16 chars)
                const lng = hexToFloat64(hex.substring(18, 18 + 16));
                const lat = hexToFloat64(hex.substring(34, 34 + 16));

                return { lat, lng };
            } catch (e) {
                console.error("EWKB Parse Error:", e);
                return null;
            }
        }

        // --- Marker Management ---
        const markers = new Map();

        function addMarker(drop) {
            // Support both direct lat/lng (from RPC return) and location hex (from direct select)
            let lat, lng;
            if (drop.lat !== undefined && drop.lng !== undefined) {
                lat = drop.lat;
                lng = drop.lng;
            } else if (drop.location) {
                const coords = parseHexEWKB(drop.location);
                if (coords) {
                    lat = coords.lat;
                    lng = coords.lng;
                }
            }

            if (isNaN(lat) || isNaN(lng)) return;

            const smileIcon = L.divIcon({
                className: 'custom-smile-icon',
                html: `<div style="background:var(--primary); color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 15px var(--primary-glow); border:2px solid white;">
                        <i data-lucide="smile" style="width:18px;height:18px;"></i>
                       </div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            const popupContent = `
                <div style="text-align:center; min-width:150px; padding:10px;">
                    <div style="color:var(--primary-bright); font-weight:800; font-size:1.2rem; margin-bottom:5px;">
                        ${drop.points} PTS
                    </div>
                    <div id="status-${drop.id}" style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">
                        ${drop.collected_by ? '✅ Collected' : '✨ Available'}
                    </div>
                    <div id="collector-info-${drop.id}" class="mt-2">
                        ${drop.collected_by ? '<div class="spinner-border spinner-border-sm text-primary" role="status"></div>' : ''}
                    </div>
                </div>
            `;

            const marker = L.marker([lat, lng], { icon: smileIcon }).addTo(map);
            marker.bindPopup(popupContent, { className: 'custom-popup' });

            // Dynamic fetching of collector data
            marker.on('popupopen', async () => {
                if (drop.collected_by) {
                    const infoDiv = document.getElementById(`collector-info-${drop.id}`);
                    const statusDiv = document.getElementById(`status-${drop.id}`);

                    if (infoDiv && infoDiv.innerHTML.includes('spinner-border')) {
                        const { data: userData, error } = await supabaseClient
                            .from('users')
                            .select('name, photo_url, bio, country, gender')
                            .eq('uuid', drop.collected_by)
                            .single();

                        if (userData) {
                            window.userProfileCache[drop.collected_by] = userData;

                            // Prevent XSS by building DOM elements carefully
                            statusDiv.textContent = '✅ Collected by';

                            const userLink = document.createElement('div');
                            userLink.className = 'collector-chip';
                            userLink.style.cssText = 'cursor:pointer; display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); margin-top:5px;';
                            userLink.onclick = () => showUserProfile(drop.collected_by);

                            const img = document.createElement('img');
                            img.src = userData.photo_url || 'https://i.pravatar.cc/150';
                            img.style.cssText = 'width:24px; height:24px; border-radius:50%; border:1px solid var(--primary);';

                            const nameSpan = document.createElement('span');
                            nameSpan.style.cssText = 'font-size:0.85rem; font-weight:600; color:var(--text-main);';
                            nameSpan.textContent = userData.name;

                            userLink.appendChild(img);
                            userLink.appendChild(nameSpan);

                            infoDiv.innerHTML = ''; // Clear spinner
                            infoDiv.appendChild(userLink);
                        } else {
                            infoDiv.innerHTML = '';
                            const errorSpan = document.createElement('span');
                            errorSpan.style.cssText = 'font-size:0.75rem; color:var(--danger);';
                            errorSpan.textContent = 'Error loading details';
                            infoDiv.appendChild(errorSpan);
                        }
                    }
                }
            });

            markers.set(drop.id, marker);
            lucide.createIcons();
        }

        async function showUserProfile(userId) {
            const userData = window.userProfileCache[userId];
            if (!userData) return;

            const modalEl = document.getElementById('userProfileModal');
            const modal = new bootstrap.Modal(modalEl);

            modal.show();

            try {
                console.log('User DATA:', userData);
                document.getElementById('profileModalName').textContent = userData.name || 'User Name';
                document.getElementById('profileModalPhoto').src = userData.photo_url || 'https://i.pravatar.cc/150';
                document.getElementById('profileModalPoints').textContent = userData.bio || 'No bio available';
                document.getElementById('profileModalCollections').textContent = userData.gender || 'Unknown';
                document.getElementById('profileModalJoined').textContent = userData.country || 'Unknown';

                lucide.createIcons();
            } catch (err) {
                console.error('Error displaying profile:', err);
            }
        }

        function removeMarker(id) {
            if (markers.has(id)) {
                map.removeLayer(markers.get(id));
                markers.delete(id);
            }
        }

        async function loadDrops() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) return;

                // Using direct select as requested
                const { data: selectData, error: selectError } = await supabaseClient
                    .from('promotional_drops')
                    .select('id, points, distributor_name, distributor_photo, distributor_link, collected_by, location')
                    .eq('distributor_id', user.id);

                if (selectError) {
                    console.error('Error loading drops:', selectError);
                    return;
                }

                if (selectData) {
                    // Clear existing markers before re-loading
                    markers.forEach((marker, id) => removeMarker(id));
                    selectData.forEach(drop => addMarker(drop));
                }
            } catch (err) {
                console.error('Failed to load drops:', err);
            }
        }

        // Initial load
        setTimeout(async () => {
            await loadDrops();
        }, 1000);

        async function sendSmile() {
            const amountInput = document.querySelector('input[type="number"]');
            const stateSelect = document.querySelector('.form-select');
            const photoInput = document.getElementById('smilePhoto');
            const linkInput = document.getElementById('smileLink');

            const totalPoints = parseInt(amountInput.value);
            const stateCode = stateSelect.value;
            const link = linkInput.value;
            let photoUrl = "";

            if (!totalPoints || !stateCode) {
                alert('Please enter points and select a state.');
                return;
            }

            if (totalPoints < 50) {
                alert('Minimum reward amount is 50 points.');
                return;
            }

            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                console.log('sendSmile Auth User:', user);

                if (!user) {
                    alert('You must be logged in to distribute rewards.');
                    return;
                }

                // Note: user.display_name and user.avatar_url might be undefined 
                // depending on how the session is stored. Checking metadata:
                console.log('User Metadata:', user.user_metadata);


                // Photo Upload
                if (photoInput.files && photoInput.files.length > 0) {
                    const file = photoInput.files[0];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${user.id}/${Date.now()}.${fileExt}`;
                    const filePath = `${fileName}`;

                    const { error: uploadError } = await supabaseClient.storage
                        .from('promotion')
                        .upload(filePath, file);

                    if (uploadError) {
                        alert('File upload failed');
                        return;
                    }

                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('promotion')
                        .getPublicUrl(filePath);

                    photoUrl = publicUrl;
                }

                // Call Database Function
                const { data, error } = await supabaseClient.rpc('distribute_promotional_drops', {
                    total_points_to_drop: totalPoints,
                    target_state_code: stateCode,
                    photo_url: photoUrl,
                    secret_link: link
                });

                console.log('distribute_promotional_drops result:', { data, error });
                if (error) {
                    alert(`Error distributing rewards: ${error.message}`);
                    return;
                }

                // Immediately place the new pins on the map
                loadDrops();

                alert(`Success! Created ${data.length} interactive reward pins in ${stateCode}.`);

                // UI Cleanup
                checkSession();
                const modal = bootstrap.Modal.getInstance(document.getElementById('shareSmilesModal'));
                modal.hide();

                // Clear inputs
                amountInput.value = '';
                stateSelect.selectedIndex = 0;
                photoInput.value = '';
                linkInput.value = '';
            } catch (err) {
                console.error('Error distributing rewards:', err);
                alert('Action failed: ' + (err.message || err));
            }
        }

        document.getElementById('sendSmileBtn').addEventListener('click', sendSmile);
    </script>
</body>

</html>
